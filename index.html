<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>ece interview flashcards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:monospace;min-height:100vh;padding:48px 24px;color:#111}

/* HOME */
#view-study{display:none}
#home-header{display:flex;align-items:baseline;gap:20px;max-width:920px;margin:0 auto 36px;white-space:nowrap}
#home-header h1{font-weight:400;letter-spacing:.1em;font-size:2rem}
#g-total{margin-left:auto;font-size:.75rem;color:#aaa}

#topic-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  max-width:920px;margin:0 auto;
  border-left:1px solid #111;border-top:1px solid #111;
}
.topic-card{border-right:1px solid #111;border-bottom:1px solid #111;padding:20px;cursor:pointer;transition:background .1s}
.topic-card:hover{background:#f5f5f5}
.tc-name{font-size:.85rem;letter-spacing:.05em;margin-bottom:6px}
.tc-secs{font-size:.7rem;color:#888;line-height:1.7;margin-bottom:14px}
.tc-count{font-size:.7rem;color:#aaa}

/* STUDY */
#view-study{flex-direction:column;align-items:center;padding:48px 24px;min-height:100vh}
#study-nav{display:flex;align-items:center;gap:16px;width:100%;max-width:680px;margin-bottom:28px}
#back-btn{background:none;border:none;font-family:monospace;font-size:.8rem;cursor:pointer;color:#888;letter-spacing:.05em;padding:0}
#back-btn:hover{color:#111}
#study-topic-label{font-size:.85rem;letter-spacing:.05em}
#study-counter{margin-left:auto;font-size:.7rem;color:#aaa}

#sections-bar{display:flex;border:1px solid #111;width:100%;max-width:680px;margin-bottom:28px;overflow-x:auto}
#sections-bar::-webkit-scrollbar{height:0}
.sec-chip{padding:8px 14px;font-family:monospace;font-size:.7rem;cursor:pointer;background:#fff;border:none;border-right:1px solid #111;color:#888;white-space:nowrap;letter-spacing:.03em}
.sec-chip:last-child{border-right:none}
.sec-chip.active{background:#111;color:#fff}
.sec-chip:hover:not(.active){background:#f5f5f5}

#prog-bar{width:100%;max-width:680px;height:1px;background:#eee;margin-bottom:28px}
#prog-fill{height:100%;background:#111;transition:width .3s}

#card{border:1px solid #111;padding:40px;width:100%;max-width:680px;min-height:160px;display:flex;flex-direction:column;gap:10px;cursor:pointer}
#card:hover{background:#fafafa}
#card-sec{font-size:.65rem;letter-spacing:.1em;color:#bbb;text-transform:uppercase}
#card-q{font-size:1rem;line-height:1.75;color:#111}

#nav-btns{display:flex;width:100%;max-width:680px;border:1px solid #111;border-top:none}
.nav-btn{flex:1;padding:12px;font-family:monospace;font-size:.75rem;cursor:pointer;background:#fff;border:none;letter-spacing:.05em;color:#888}
.nav-btn:first-child{border-right:1px solid #111}
.nav-btn:hover{background:#111;color:#fff}

#kbd-hint{margin-top:10px;font-size:.65rem;color:#ddd;letter-spacing:.05em;width:100%;max-width:680px;text-align:center}

#empty-state{display:none;text-align:center;padding:60px;border:1px solid #111;width:100%;max-width:680px}
#empty-state p{font-size:.85rem;color:#666;margin-bottom:20px;letter-spacing:.03em}
.action-btn{background:#111;color:#fff;border:none;padding:10px 24px;font-family:monospace;font-size:.8rem;cursor:pointer;letter-spacing:.05em}
.action-btn:hover{background:#333}
#tagline{font-size:.75rem;color:#aaa;max-width:920px;margin:0 auto 28px;letter-spacing:.03em}
footer{font-size:.7rem;color:#ccc;text-align:center;padding:48px 0 0;max-width:920px;margin:0 auto}
footer a{color:#ccc}
</style>
</head>
<body>

<div id="view-home">

  <footer>built by <a href="mailto:sr185@rice.edu">sr185@rice.edu</a></footer>

// ── Card index ──
const allCards=[];
for(const t of TOPICS)for(let si=0;si<t.sections.length;si++)for(let qi=0;qi<t.sections[si].q.length;qi++)
  allCards.push({topicId:t.id,si,sectionName:t.sections[si].name,question:t.sections[si].q[qi]});

// ── Home ──
function renderHome(){
  document.getElementById('view-home').style.display='block';
  document.getElementById('view-study').style.display='none';
  document.getElementById('g-total').textContent=allCards.length+' cards';
  const grid=document.getElementById('topic-grid');grid.innerHTML='';
  for(const t of TOPICS){
    const tc=allCards.filter(c=>c.topicId===t.id);
    const card=document.createElement('div');card.className='topic-card';card.onclick=()=>startStudy(t.id);
    card.innerHTML=`<div class="tc-name">${t.name}</div>
      <div class="tc-secs">${t.sections.map(s=>s.name).join(' · ')}</div>
      <div class="tc-count">${tc.length} cards</div>`;
    grid.appendChild(card);
  }
}

// ── Study ──
let studyTopic=null,currentSection='__all__',deck=[],idx=0;

function startStudy(topicId){
  studyTopic=TOPICS.find(t=>t.id===topicId);
  document.getElementById('view-home').style.display='none';
  document.getElementById('view-study').style.display='flex';
  document.getElementById('study-topic-label').textContent=studyTopic.name;
  renderSecBar();startSection('__all__');
}
function showHome(){renderHome();}
function renderSecBar(){
  const bar=document.getElementById('sections-bar');bar.innerHTML='';
  const all=document.createElement('button');all.className='sec-chip'+(currentSection==='__all__'?' active':'');
  all.textContent='all';all.onclick=()=>startSection('__all__');bar.appendChild(all);
  for(let si=0;si<studyTopic.sections.length;si++){
    const btn=document.createElement('button');btn.className='sec-chip'+(currentSection===String(si)?' active':'');
    btn.textContent=studyTopic.sections[si].name;btn.onclick=(i=>()=>startSection(String(i)))(si);bar.appendChild(btn);
  }
}
function startSection(sec){
  currentSection=sec;renderSecBar();
  let pool=allCards.filter(c=>c.topicId===studyTopic.id);
  if(sec!=='__all__')pool=pool.filter(c=>c.si===Number(sec));
  deck=pool;idx=0;renderCard();
}
function renderCard(){
  const empty=document.getElementById('empty-state');
  const cardEl=document.getElementById('card');
  const navEl=document.getElementById('nav-btns');
  const hintEl=document.getElementById('kbd-hint');
  if(!deck.length){cardEl.style.display='none';navEl.style.display='none';hintEl.style.display='none';empty.style.display='block';return;}
  cardEl.style.display='flex';navEl.style.display='flex';hintEl.style.display='block';empty.style.display='none';
  document.getElementById('prog-fill').style.width=((idx+1)/deck.length*100)+'%';
  document.getElementById('study-counter').textContent=`${idx+1} / ${deck.length}`;
  document.getElementById('card-sec').textContent=deck[idx].sectionName;
  document.getElementById('card-q').textContent=deck[idx].question;
}
function next(){if(deck.length){idx=(idx+1)%deck.length;renderCard();}}
function prev(){if(deck.length){idx=(idx-1+deck.length)%deck.length;renderCard();}}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(document.getElementById('view-study').style.display==='none')return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
});

renderHome();
</script>
